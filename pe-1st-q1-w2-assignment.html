      })
      .catch(function(err) {
        console.log('Video manifest not yet available:', err.message);
      });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadVideos);
  } else {
    loadVideos();
  }
})();
</script>
</body>
</html>
